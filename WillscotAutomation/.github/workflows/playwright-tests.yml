name: WillScot Playwright BDD Tests

on:
  push:
    branches: [ main, develop, release/* ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'QA'
        type: choice
        options: [ QA, Stage, Prod ]
      browser:
        description: 'Browser engine'
        required: true
        default: 'chromium'
        type: choice
        options: [ chromium, firefox, webkit ]
      tags:
        description: 'NUnit filter (e.g. @smoke, @regression, @TC001)'
        required: false
        default: ''

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH:   'WillscotAutomation/WillscotAutomation.csproj'
  TEST_RESULTS:   'WillscotAutomation/TestResults'
  ALLURE_RESULTS: 'WillscotAutomation/allure-results'

jobs:
  test:
    name: Run BDD Tests (${{ github.event.inputs.browser || 'chromium' }} / ${{ github.event.inputs.environment || 'QA' }})
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── .NET SDK ──────────────────────────────────────────────────────────────
      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # ── Restore & Build ───────────────────────────────────────────────────────
      - name: Restore NuGet packages
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build solution
        run: dotnet build ${{ env.PROJECT_PATH }} --no-restore --configuration Release

      # ── Playwright Browsers ───────────────────────────────────────────────────
      - name: Install Playwright CLI
        run: dotnet tool install --global Microsoft.Playwright.CLI --version 1.44.0
        continue-on-error: true

      - name: Install Playwright browser binaries
        run: |
          cd WillscotAutomation
          pwsh bin/Release/net8.0/playwright.ps1 install --with-deps ${{ github.event.inputs.browser || 'chromium' }}

      # ── Run Tests ─────────────────────────────────────────────────────────────
      - name: Run Reqnroll / NUnit tests
        env:
          TEST_ENV: ${{ github.event.inputs.environment || 'QA' }}
          BROWSER:  ${{ github.event.inputs.browser   || 'chromium' }}
          HEADLESS: 'true'
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          FILTER="${{ github.event.inputs.tags }}"
          if [ -n "$FILTER" ]; then
            dotnet test ${{ env.PROJECT_PATH }} \
              --no-build \
              --configuration Release \
              --logger "trx;LogFileName=results.trx" \
              --results-directory ${{ env.TEST_RESULTS }} \
              --filter "Category=$FILTER"
          else
            dotnet test ${{ env.PROJECT_PATH }} \
              --no-build \
              --configuration Release \
              --logger "trx;LogFileName=results.trx" \
              --results-directory ${{ env.TEST_RESULTS }}
          fi

      # ── Allure Report ─────────────────────────────────────────────────────────
      - name: Setup Java (required by Allure CLI)
        if: always()
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Allure CLI
        if: always()
        run: |
          curl -o allure-2.27.0.tgz -OLs https://repo.maven.apache.org/maven2/io/qameta/allure/allure-commandline/2.27.0/allure-commandline-2.27.0.tgz
          tar -zxf allure-2.27.0.tgz -C /opt
          echo "/opt/allure-2.27.0/bin" >> $GITHUB_PATH

      - name: Generate Allure report
        if: always()
        run: |
          allure generate ${{ env.ALLURE_RESULTS }} --clean -o allure-report

      # ── Upload Artefacts ──────────────────────────────────────────────────────
      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report-${{ github.run_number }}
          path: allure-report
          retention-days: 30

      - name: Upload TRX Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trx-results-${{ github.run_number }}
          path: ${{ env.TEST_RESULTS }}
          retention-days: 14

      - name: Upload Allure Raw Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-${{ github.run_number }}
          path: ${{ env.ALLURE_RESULTS }}
          retention-days: 14

      - name: Upload Test Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-logs-${{ github.run_number }}
          path: WillscotAutomation/logs/
          retention-days: 14
