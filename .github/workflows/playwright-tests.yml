name: Playwright BDD Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: 1

jobs:
  test:
    name: Build & Test
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        working-directory: WillscotAutomation
        run: dotnet restore

      - name: Build
        working-directory: WillscotAutomation
        run: dotnet build --no-restore --configuration Release

      - name: Install Playwright browsers
        working-directory: WillscotAutomation
        run: pwsh bin/Release/net8.0/playwright.ps1 install chromium

      - name: Run tests
        working-directory: WillscotAutomation
        run: |
          dotnet test `
            --no-build `
            --configuration Release `
            --settings WillscotAutomation.runsettings `
            --logger "trx;LogFileName=gh-results.trx" `
            --results-directory TestResults

      - name: Publish TRX test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: NUnit Results
          path: WillscotAutomation/TestResults/gh-results.trx
          reporter: dotnet-trx
          fail-on-error: false

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-${{ github.run_number }}
          path: WillscotAutomation/allure-results/
          retention-days: 14

      - name: Upload TRX results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trx-results-${{ github.run_number }}
          path: WillscotAutomation/TestResults/
          retention-days: 14
