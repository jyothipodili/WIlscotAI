# NOTE: This Service is a placeholder for future use.
# A Kubernetes Job (test runner) has no incoming traffic, so no Service is
# strictly required.  Uncomment and use this when you add a web-serving
# container (e.g. Allure report server, a REST API, etc.).
#
# To expose, run:  minikube service willscot-web -n willscot --url
# -----------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: willscot-web
  namespace: willscot
  labels:
    app: willscot-web
spec:
  type: NodePort
  selector:
    app: willscot-web       # must match the Deployment pod label
  ports:
    - name: http
      protocol: TCP
      port: 80              # cluster-internal port
      targetPort: 80        # container port
      nodePort: 30080       # host port exposed by minikube (30000-32767)
